problems:
  - id: 1
    title: 実数15個の算術平均
    category: 基本統計
    prompt: |
      次の15個の数値の算術平均を小数点以下2桁まで求めてください。

      3.7, 8.2, 1.5, 9.4, 2.8, 7.1, 4.6, 6.3, 5.9, 0.5, 7.8, 3.2, 6.1, 4.9, 8.4
    correct_answer: "5.36"
    correct_answer_detail: "合計80.4 ÷ 15 = 5.36"

  - id: 2
    title: 標本標準偏差（8個）
    category: 基本統計
    prompt: |
      次の8つの測定値の標本標準偏差（不偏標準偏差、分母 n−1）を
      小数点以下3桁まで求めてください。

      12.3, 8.7, 15.1, 9.4, 11.8, 14.2, 10.5, 13.6
    correct_answer: "2.300"
    correct_answer_detail: "平均11.95, 偏差二乗和37.02, 分散5.2886, SD=√5.2886≈2.300"

  - id: 3
    title: 対応なし2標本t検定（有意差なし）
    category: t検定
    prompt: |
      ある薬の効果を調べるため、投与群と対照群でそれぞれ10人ずつ測定しました。
      対応のない2標本t検定（等分散を仮定）を行い、
      t統計量・自由度・p値（両側）を求め、有意水準5%で判定してください。

      投与群: 22.4, 18.7, 21.3, 24.8, 19.5, 23.1, 20.6, 22.9, 18.2, 21.7
      対照群: 20.1, 23.5, 19.8, 22.4, 21.7, 20.3, 23.9, 21.1, 22.6, 20.8
    correct_answer: "t≈-0.373, df=18, p≈0.714, 有意差なし"
    correct_answer_detail: "平均差-0.30, pooled SD≈1.797, SE≈0.804, t=-0.373, p≈0.714"

  - id: 4
    title: 対応あり1標本t検定（有意差あり）
    category: t検定
    prompt: |
      ダイエットプログラムの前後で体重（kg）を測定しました。
      対応のあるt検定（前後差の1標本t検定）を行い、
      t統計量・自由度・p値（両側）を求め、有意水準5%で判定してください。

      介入前: 85.2, 78.4, 91.3, 82.7, 88.1, 76.5, 90.2, 83.6, 87.4, 79.8
      介入後: 79.3, 74.1, 87.8, 79.5, 84.2, 74.3, 86.7, 77.8, 84.1, 77.2
    correct_answer: "t≈9.88, df=9, p<0.0001, 有意差あり"
    correct_answer_detail: "差の平均3.82, 差のSD≈1.223, SE≈0.387, t=9.88, p<0.0001"

  - id: 5
    title: ピアソン相関係数と有意性検定
    category: 相関
    prompt: |
      2変数の関連を調べました。ピアソン積率相関係数を求め、
      t検定により有意水準5%で相関の有意性を判定してください（両側）。

      x: 3.7, 8.2, 1.5, 9.4, 2.8, 7.1, 4.6, 6.3, 5.9, 0.5
      y: 3.2, 7.1, 2.4, 8.8, 4.3, 6.5, 9.1, 3.7, 7.6, 5.9
    correct_answer: "r≈0.560, p≈0.092, 有意な相関なし（α=0.05）"
    correct_answer_detail: "r=0.560, df=8, t=r√8/√(1-r²)≈1.883, p≈0.092 > 0.05 → 有意差なし"
